<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤمن | إذاعة القرآن الكريم السعودية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Tajawal:wght@300;400;500;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04140d;
    --green:#0f5c3f;
    --green-deep:#083c29;
    --gold:#d4b483;
    --gold-soft:#e9d3a8;
    --sand:#f2ead9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 120%, #0b3324 0%, var(--bg) 60%);
    color:var(--sand);
    font-family:'Tajawal', sans-serif;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow-x:hidden;
  }
  /* Sadu-inspired zigzag border top & bottom */
  .sadu{
    position:fixed; left:0; right:0; height:16px; z-index:3;
    background:
      repeating-linear-gradient(135deg, var(--gold) 0 10px, transparent 10px 20px),
      repeating-linear-gradient(45deg, var(--green) 0 10px, transparent 10px 20px);
    opacity:.85;
  }
  .sadu.top{top:0;}
  .sadu.bottom{bottom:0;}

  /* dune horizon */
  .horizon{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(circle 90px at 82% 18%, rgba(233,211,168,.35), transparent 70%);
  }
  .dune{
    position:fixed; bottom:0; left:0; right:0; height:38vh; z-index:0;
    background:linear-gradient(180deg, transparent, rgba(15,92,63,.35));
    clip-path: polygon(0 60%, 20% 45%, 45% 62%, 70% 40%, 100% 58%, 100% 100%, 0 100%);
  }

  .brand{
    position:fixed; top:26px; right:26px; z-index:5;
    font-family:'Reem Kufi', sans-serif;
    font-size:1.25rem; color:var(--gold-soft); letter-spacing:1px;
  }
  .brand span{display:block; font-size:.8rem; opacity:.6; font-family:'Tajawal'; margin-top:2px;}

  .panel{
    position:relative; z-index:2;
    width:min(420px, 90vw);
    background:linear-gradient(180deg, rgba(8,60,41,.9), rgba(4,20,13,.95));
    border:1px solid rgba(212,180,131,.3);
    border-radius:20px;
    padding:38px 30px 30px;
    box-shadow:0 30px 70px rgba(0,0,0,.55);
    text-align:center;
  }
  .eyebrow{ font-size:.78rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
  h1{ font-family:'Reem Kufi', sans-serif; font-size:2rem; margin:10px 0 4px; }
  .sub{ color:#bcd; font-size:.9rem; opacity:.75; margin-bottom:26px; }

  .dial-wrap{ position:relative; width:200px; height:200px; margin:0 auto 48px; }
  .rings{ position:absolute; inset:0; border-radius:50%; border:1px solid rgba(212,180,131,.25); }
  .rings::before,.rings::after{ content:""; position:absolute; border-radius:50%; border:1px solid rgba(212,180,131,.15); }
  .rings::before{ inset:14px; }
  .rings::after{ inset:28px; }

  #playBtn{
    position:absolute; inset:42px; border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, var(--green) 0%, var(--green-deep) 70%);
    box-shadow:0 12px 26px rgba(15,92,63,.55), inset 0 2px 6px rgba(255,255,255,.12);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  #playBtn:active{ transform:scale(.95); }
  #playBtn svg{ width:46px; height:46px; fill:var(--gold-soft); }

  .bars{ position:absolute; bottom:-34px; left:50%; transform:translateX(-50%); display:flex; gap:4px; align-items:flex-end; height:20px; }
  .bars i{ width:3px; background:var(--gold); border-radius:2px; height:6px; }
  body.playing .bars i{ animation:bounce 1s ease-in-out infinite; }
  .bars i:nth-child(1){animation-delay:.0s;}
  .bars i:nth-child(2){animation-delay:.15s;}
  .bars i:nth-child(3){animation-delay:.3s;}
  .bars i:nth-child(4){animation-delay:.45s;}
  .bars i:nth-child(5){animation-delay:.6s;}
  @keyframes bounce{0%,100%{height:5px;} 50%{height:20px;}}

  .status{ font-size:.95rem; color:var(--gold-soft); min-height:22px; margin-bottom:6px; }
  .station-name{ font-size:1.05rem; font-weight:800; }
  .freq{ font-size:.8rem; color:#9cb; margin-top:4px; opacity:.8;}

  .divider{ margin:24px 0 18px; height:1px; background:linear-gradient(90deg, transparent, rgba(212,180,131,.5), transparent); }
  footer{ font-size:.72rem; color:#8a9; }
</style>
</head>
<body>
  <div class="sadu top"></div>
  <div class="sadu bottom"></div>
  <div class="horizon"></div>
  <div class="dune"></div>
  <div class="brand">مؤمن</div>

  <div class="panel">
    <div class="eyebrow">راديو السعودية</div>
    <h1>إذاعة القرآن الكريم</h1>
    <div class="sub">من المملكة العربية السعودية — بثًا مباشرًا</div>

    <div class="dial-wrap">
      <div class="rings"></div>
      <button id="playBtn" aria-label="تشغيل / إيقاف الإذاعة">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <div class="status" id="status">اضغط للاستماع</div>
    <div class="station-name">إذاعة القرآن الكريم — السعودية</div>
    <div class="freq">بث إنترنت مباشر · جودة عالية</div>

    <div class="divider"></div>
    <footer>مؤمن — رفيقك في رحلة القرآن</footer>
  </div>

  <audio id="radio" preload="none">
    <source src="https://stream.radiojar.com/0tpy1h0kxtzuv" type="audio/mpeg">
  </audio>

<script>
  const audio = document.getElementById('radio');
  const btn = document.getElementById('playBtn');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const status = document.getElementById('status');
  let playing = false;

  btn.addEventListener('click', () => {
    if(!playing){
      status.textContent = 'جاري الاتصال بالبث...';
      audio.play().then(()=>{
        playing = true;
        document.body.classList.add('playing');
        iconPlay.style.display='none';
        iconPause.style.display='block';
        status.textContent = 'يُبث الآن مباشرة';
      }).catch(()=>{
        status.textContent = 'تعذر تشغيل البث، حاول مجددًا';
      });
    } else {
      audio.pause();
      playing = false;
      document.body.classList.remove('playing');
      iconPlay.style.display='block';
      iconPause.style.display='none';
      status.textContent = 'تم الإيقاف';
    }
  });

  audio.addEventListener('waiting', ()=> status.textContent='جاري التحميل...');
  audio.addEventListener('playing', ()=> status.textContent='يُبث الآن مباشرة');
  audio.addEventListener('error', ()=> status.textContent='حدث خطأ في الاتصال بالإذاعة');
</script>
</body>
</html>
