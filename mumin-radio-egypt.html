<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤمن | إذاعة القرآن الكريم من القاهرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1a0705;
    --bg-mid:#3a0f0c;
    --red:#9c2027;
    --red-deep:#5c1114;
    --gold:#d4af37;
    --gold-bright:#f3d576;
    --gold-dim:#8a6a2c;
    --cream:#f4e6c8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 8%, #521712 0%, transparent 45%),
      radial-gradient(ellipse at 50% 115%, #4a1310 0%, var(--bg-deep) 55%),
      linear-gradient(180deg, var(--bg-deep), #0d0302);
    color:var(--cream);
    font-family:'Cairo', sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow-x:hidden;
    position:relative;
    padding:70px 16px 190px;
  }

  /* subtle hieroglyph texture drifting across background */
  body::before{
    content:"";
    position:fixed; inset:-10% -10%;
    opacity:.05;
    background-image: radial-gradient(var(--gold) 1px, transparent 1.4px);
    background-size: 26px 26px;
    animation: drift 40s linear infinite;
    pointer-events:none;
  }
  @keyframes drift{
    0%{ transform:translate(0,0); }
    100%{ transform:translate(-26px,-26px); }
  }

  .brand{
    position:fixed; top:44px; right:24px; z-index:6;
    font-family:'Aref Ruqaa', serif; font-size:1.3rem; color:var(--gold-bright);
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{
    width:8px; height:8px; border-radius:50%; background:#ff5b5b;
    box-shadow:0 0 8px #ff5b5b;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.25;} }

  /* the cartouche card */
  .cartouche{
    position:relative; z-index:2;
    width:min(430px, 92vw);
    padding:44px 30px 34px;
    border-radius:28px;
    background:linear-gradient(180deg, #3a120f, #200a08 70%);
    border:1px solid rgba(212,175,55,.35);
    box-shadow:
      0 40px 90px rgba(0,0,0,.6),
      inset 0 0 0 6px rgba(212,175,55,.05),
      inset 0 0 40px rgba(212,175,55,.06);
    text-align:center;
  }
  /* ornamental corners */
  .cartouche::before, .cartouche::after,
  .corner-bl, .corner-br{
    content:""; position:absolute; width:26px; height:26px;
    border:2px solid var(--gold);
    opacity:.75;
  }
  .cartouche::before{ top:10px; right:10px; border-left:none; border-bottom:none; border-radius:0 8px 0 0; }
  .cartouche::after{ top:10px; left:10px; border-right:none; border-bottom:none; border-radius:8px 0 0 0; }
  .corner-bl{ bottom:10px; left:10px; border-right:none; border-top:none; border-radius:0 0 0 8px; }
  .corner-br{ bottom:10px; right:10px; border-left:none; border-top:none; border-radius:0 0 8px 0; }

  .live-badge{
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(212,175,55,.12);
    border:1px solid rgba(212,175,55,.4);
    padding:4px 14px; border-radius:999px;
    font-size:.72rem; color:var(--gold-bright); letter-spacing:1px;
    margin-bottom:16px;
  }
  .live-badge i{ width:6px; height:6px; border-radius:50%; background:#ff5b5b; box-shadow:0 0 6px #ff5b5b; animation:pulse 1.6s ease-in-out infinite; }

  .eyebrow{ font-size:.8rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
  h1{ font-family:'Aref Ruqaa', serif; font-size:2.3rem; margin:10px 0 6px; text-shadow:0 2px 12px rgba(212,175,55,.25); }
  .sub{ color:#e2c9a9; opacity:.75; font-size:.9rem; margin-bottom:30px; }

  /* sun-disc dial */
  .dial-wrap{ position:relative; width:206px; height:206px; margin:0 auto 54px; }
  .rays{
    position:absolute; inset:0; border-radius:50%;
    background:
      repeating-conic-gradient(from 0deg, rgba(212,175,55,.35) 0deg 4deg, transparent 4deg 18deg);
    -webkit-mask:radial-gradient(circle, transparent 62%, #000 64%);
            mask:radial-gradient(circle, transparent 62%, #000 64%);
    animation:none;
  }
  body.playing .rays{ animation:spin 12s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .rings{ position:absolute; inset:18px; border-radius:50%; border:1px solid rgba(212,175,55,.3); }
  .rings::before{ content:""; position:absolute; inset:14px; border-radius:50%; border:1px solid rgba(212,175,55,.18); }

  #playBtn{
    position:absolute; inset:56px; border-radius:50%; border:none; cursor:pointer;
    background:
      radial-gradient(circle at 33% 28%, var(--red) 0%, var(--red-deep) 75%);
    box-shadow:
      0 14px 30px rgba(156,32,39,.55),
      inset 0 2px 8px rgba(255,220,150,.25),
      0 0 0 3px rgba(212,175,55,.5);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  #playBtn:active{ transform:scale(.94); }
  #playBtn svg{ width:44px; height:44px; fill:var(--gold-bright); }

  .bars{
    position:absolute; bottom:-40px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px; align-items:flex-end; height:22px;
  }
  .bars i{ width:4px; background:linear-gradient(180deg, var(--gold-bright), var(--gold-dim)); border-radius:2px; height:6px; }
  body.playing .bars i{ animation:bounce 1s ease-in-out infinite; }
  .bars i:nth-child(1){animation-delay:.0s;}
  .bars i:nth-child(2){animation-delay:.15s;}
  .bars i:nth-child(3){animation-delay:.3s;}
  .bars i:nth-child(4){animation-delay:.45s;}
  .bars i:nth-child(5){animation-delay:.6s;}
  @keyframes bounce{ 0%,100%{height:5px;} 50%{height:22px;} }

  .status{ font-size:.96rem; color:var(--gold-bright); min-height:22px; margin-bottom:8px; }
  .station-name{ font-size:1.08rem; font-weight:800; }
  .freq{ font-size:.8rem; color:#d9b98d; margin-top:4px; opacity:.85; }

  .divider{
    margin:26px 0 18px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(212,175,55,.55), transparent);
  }
  footer{ font-size:.72rem; color:#c9a679; opacity:.8; }

  /* Cairo skyline silhouette fixed at bottom */
  .skyline{
    position:fixed; left:0; right:0; bottom:0; height:150px; z-index:1;
    pointer-events:none;
  }
  .skyline svg{ width:100%; height:100%; display:block; }
</style>
</head>
<body>
  <div class="brand"><i class="dot"></i>مؤمن</div>

  <div class="cartouche">
    <div class="corner-bl"></div><div class="corner-br"></div>
    <div class="live-badge"><i></i> بث مباشر الآن</div>
    <div class="eyebrow">راديو مصر</div>
    <h1>إذاعة القرآن الكريم</h1>
    <div class="sub">من القاهرة — بثًا مباشرًا على مدار الساعة</div>

    <div class="dial-wrap">
      <div class="rays"></div>
      <div class="rings"></div>
      <button id="playBtn" aria-label="تشغيل / إيقاف الإذاعة">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <div class="status" id="status">اضغط للاستماع</div>
    <div class="station-name">إذاعة القرآن الكريم – القاهرة</div>
    <div class="freq">93.1 FM · بث إنترنت مباشر</div>

    <div class="divider"></div>
    <footer>مؤمن — رفيقك في رحلة القرآن</footer>
  </div>

  <div class="skyline">
    <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5c1c16"/>
          <stop offset="100%" stop-color="#150503"/>
        </linearGradient>
      </defs>
      <g fill="url(#skyGrad)" opacity="0.9">
        <rect x="0" y="120" width="1200" height="80"/>
        <path d="M120 190 L128 60 L132 60 L140 190 Z"/>
        <ellipse cx="130" cy="55" rx="10" ry="6"/>
        <circle cx="330" cy="118" r="34"/>
        <rect x="300" y="118" width="60" height="72"/>
        <rect x="255" y="70" width="10" height="120"/>
        <circle cx="260" cy="66" r="6"/>
        <rect x="395" y="70" width="10" height="120"/>
        <circle cx="400" cy="66" r="6"/>
        <path d="M560 190 L610 100 L660 190 Z"/>
        <path d="M645 190 L680 130 L715 190 Z"/>
        <rect x="820" y="90" width="14" height="100"/>
        <circle cx="827" cy="84" r="7"/>
        <circle cx="900" cy="130" r="26"/>
        <rect x="878" y="130" width="44" height="60"/>
        <rect x="960" y="60" width="12" height="130"/>
        <circle cx="966" cy="55" r="6"/>
      </g>
    </svg>
  </div>

  <audio id="radio" preload="none">
    <source src="https://stream.radiojar.com/8s5u5tpdtwzuv" type="audio/mpeg">
  </audio>

<script>
  const audio = document.getElementById('radio');
  const btn = document.getElementById('playBtn');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const status = document.getElementById('status');
  let playing = false;

  btn.addEventListener('click', () => {
    if(!playing){
      status.textContent = 'جاري الاتصال بالبث...';
      audio.play().then(()=>{
        playing = true;
        document.body.classList.add('playing');
        iconPlay.style.display='none';
        iconPause.style.display='block';
        status.textContent = 'يُبث الآن مباشرة';
      }).catch(()=>{
        status.textContent = 'تعذر تشغيل البث، حاول مجددًا';
      });
    } else {
      audio.pause();
      playing = false;
      document.body.classList.remove('playing');
      iconPlay.style.display='block';
      iconPause.style.display='none';
      status.textContent = 'تم الإيقاف';
    }
  });

  audio.addEventListener('waiting', ()=> status.textContent='جاري التحميل...');
  audio.addEventListener('playing', ()=> status.textContent='يُبث الآن مباشرة');
  audio.addEventListener('error', ()=> status.textContent='حدث خطأ في الاتصال بالإذاعة');
</script>
</body>
</html>
