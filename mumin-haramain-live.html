<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤمن | البث المباشر للحرمين الشريفين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070604;
    --panel:#0e0c08;
    --gold:#c9a24b;
    --gold-bright:#e9c876;
    --egypt-red:#8b1e23;
    --saudi-green:#0f5c3f;
    --cream:#efe6cf;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, #1a160d 0%, var(--bg) 60%);
    color:var(--cream);
    font-family:'Cairo', sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:26px 16px 40px;
  }
  .brand{ font-family:'Amiri', serif; font-size:1.4rem; color:var(--gold-bright); margin-bottom:2px; }
  .brand span{ display:block; font-size:.72rem; font-family:'Cairo'; letter-spacing:2px; opacity:.55; }
  h1{ font-family:'Amiri', serif; font-size:1.9rem; margin:14px 0 6px; text-align:center; }
  .sub{ opacity:.7; font-size:.9rem; margin-bottom:26px; text-align:center; }

  /* Kiswah gold frame around the video */
  .stage{
    position:relative;
    width:min(920px, 94vw);
    padding:14px;
    border-radius:16px;
    background:
      linear-gradient(180deg, #14110a, #0a0906);
    border:2px solid var(--gold);
    box-shadow:0 0 0 1px rgba(201,162,75,.25), 0 30px 80px rgba(0,0,0,.6);
  }
  .hizam{
    position:absolute; inset:6px;
    border:1px dashed rgba(201,162,75,.4);
    border-radius:10px;
    pointer-events:none;
  }
  .video-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:8px;
    overflow:hidden;
    background:#000;
  }
  .video-wrap iframe{
    position:absolute; inset:0; width:100%; height:100%; border:0;
  }

  .controls{
    display:flex; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap;
  }
  .ctrl-btn{
    display:flex; align-items:center; gap:8px;
    background:rgba(201,162,75,.12);
    border:1px solid rgba(201,162,75,.4);
    color:var(--gold-bright);
    padding:10px 18px;
    border-radius:999px;
    font-family:'Cairo'; font-size:.88rem; font-weight:600;
    cursor:pointer;
    transition:background .2s ease;
  }
  .ctrl-btn:hover{ background:rgba(201,162,75,.22); }
  .ctrl-btn svg{ width:18px; height:18px; fill:var(--gold-bright); }

  .live-dot{
    width:9px; height:9px; border-radius:50%;
    background:#e13030;
    box-shadow:0 0 6px 1px rgba(225,48,48,.7);
    animation:livePulse 2.2s ease-in-out infinite;
  }
  @keyframes livePulse{
    0%{ opacity:1; }
    50%{ opacity:.15; }
    100%{ opacity:1; }
  }

  .divider{
    width:min(920px,94vw);
    height:1px;
    margin:34px 0 22px;
    background:linear-gradient(90deg, transparent, rgba(201,162,75,.5), transparent);
  }

  .radios{
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
    width:min(920px,94vw);
  }
  .radio-card{
    flex:1 1 260px;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px;
    border-radius:14px;
    text-decoration:none;
    color:var(--cream);
    font-family:'Cairo'; font-weight:800;
    box-shadow:0 14px 30px rgba(0,0,0,.4);
    transition:transform .15s ease;
  }
  .radio-card:hover{ transform:translateY(-3px); }
  .radio-card.egypt{ background:linear-gradient(135deg, var(--egypt-red), #4d1013); }
  .radio-card.saudi{ background:linear-gradient(135deg, var(--saudi-green), #072c1e); }
  .radio-card .label small{ display:block; font-weight:400; font-size:.72rem; opacity:.8; margin-top:3px;}
  .radio-card .arrow{ font-size:1.3rem; }

  footer{ margin-top:30px; font-size:.72rem; color:#a89; text-align:center; }
</style>
</head>
<body>
  <div class="brand">مؤمن</div>
  <h1>البث المباشر للحرمين الشريفين</h1>
  <div class="sub">المسجد الحرام والمسجد النبوي — بثًا حيًا بجودة عالية على مدار الساعة</div>

  <div class="stage">
    <div class="hizam"></div>
    <div class="video-wrap">
      <iframe id="haramainFrame"
        src="https://www.youtube.com/embed/live_stream?channel=UCos52azQNBgW63_9uDJoPDA&autoplay=1&mute=1"
        title="البث المباشر للحرمين الشريفين"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="fsBtn">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      تكبير الشاشة
    </button>
    <button class="ctrl-btn" id="pipBtn">
      <svg viewBox="0 0 24 24"><path d="M19 7H9a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2V9a2 2 0 00-2-2zm-8 6.5V10l3.5 1.75L11 13.5z"/></svg>
      عرض على التلفاز
    </button>
    <button class="ctrl-btn" id="switchBtn">
      <span class="live-dot"></span>
      <span id="switchBtnLabel">المسجد النبوي</span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="radios">
    <a class="radio-card egypt" href="./mumin-radio-egypt.html">
      <span class="label">إذاعة القرآن الكريم — مصر<small>القاهرة · 93.1 FM</small></span>
      <span class="arrow">◄</span>
    </a>
    <a class="radio-card saudi" href="./mumin-radio-saudi.html">
      <span class="label">إذاعة القرآن الكريم — السعودية<small>بث مباشر</small></span>
      <span class="arrow">◄</span>
    </a>
  </div>

  <footer>مؤمن — رفيقك في رحلة القرآن</footer>

<script>
  const stage = document.querySelector('.stage');
  document.getElementById('fsBtn').addEventListener('click', () => {
    if (!document.fullscreenElement){
      stage.requestFullscreen?.() || stage.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  });
  document.getElementById('pipBtn').addEventListener('click', () => {
    alert('لعرض البث على شاشة التلفاز: افتح هذه الصفحة على متصفح كروم ثم اختر "بث" (Cast) من قائمة المتصفح، أو استخدم خاصية AirPlay إن كنت تستخدم آيفون/آيباد، أو افتح تطبيق يوتيوب على التلفاز وابحث عن قناة KSA Qur\'an TV مباشرة.');
  });

  const haramainFrame = document.getElementById('haramainFrame');
  const meccaSrc  = "https://www.youtube.com/embed/live_stream?channel=UCos52azQNBgW63_9uDJoPDA&autoplay=1&mute=1";
  const medinaSrc = "https://www.youtube.com/embed/_z3sUkvqtEI?autoplay=1&mute=1";
  let showingMedina = false;
  document.getElementById('switchBtn').addEventListener('click', () => {
    showingMedina = !showingMedina;
    haramainFrame.src = showingMedina ? medinaSrc : meccaSrc;
    document.getElementById('switchBtnLabel').textContent = showingMedina ? 'الحرم المكي' : 'المسجد النبوي';
  });
</script>
</body>
</html>
